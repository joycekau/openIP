<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>oneIP.io · creators</title>
<style>
  :root{--bg:#080510;--panel:#150E26;--panel2:#1B1232;--line:rgba(168,85,247,0.14);
    --gold:#EC4899;--gold-dim:#A855F7;--txt:#F4EFFC;--muted:#A99FC0;--up:#6FE0A8;--down:#FB7185;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(900px 420px at 80% -10%,rgba(236,72,153,0.06),transparent 60%),var(--bg);
    color:var(--txt);font-family:Inter,system-ui,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased;padding:0 0 60px}
  .serif{font-family:Fraunces,Georgia,serif}.mono{font-family:"JetBrains Mono",monospace}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(8,10,15,0.86);backdrop-filter:blur(10px);z-index:5}
  .brand{display:flex;align-items:center;gap:6px}.brand b{font-weight:600;font-size:22px;color:var(--gold)}.brand span{color:var(--muted);font-size:22px}
  nav{display:flex;gap:24px}nav a{color:var(--muted);text-decoration:none;font-size:14px}nav a.active,nav a:hover{color:var(--gold)}
  .btn{border:1px solid var(--gold-dim);color:var(--gold);background:transparent;padding:9px 15px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit}
  .btn:hover{background:rgba(236,72,153,0.08)}
  .btn.primary{background:linear-gradient(135deg,#EC4899,#A855F7);color:#fff;border:none;font-weight:600}
  .btn.sm{padding:6px 11px;font-size:12px}
  .wrap{max-width:1080px;margin:24px auto 0;padding:0 28px;display:grid;grid-template-columns:1.6fr 1fr;gap:22px}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:18px}
  textarea,input{width:100%;background:#0b0f18;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:11px 12px;font-size:14px;font-family:inherit}
  textarea:focus,input:focus{outline:none;border-color:var(--gold-dim)}
  textarea{resize:vertical;min-height:64px}
  .post{border-top:1px solid rgba(255,255,255,0.05);padding:16px 0}
  .post:first-child{border-top:0}
  .phead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:600;color:#fff;font-size:15px;background:linear-gradient(135deg,#EC4899,#A855F7)}
  .pname{font-weight:500;font-size:14px}.ptime{font-size:12px;color:var(--muted)}
  .pro{font-size:10px;font-weight:700;color:#fff;background:linear-gradient(135deg,#EC4899,#A855F7);padding:1px 7px;border-radius:5px;margin-left:6px}
  .ptext{font-size:14px;line-height:1.55;white-space:pre-wrap;margin:4px 0}
  .pimg{width:100%;border-radius:12px;margin-top:10px;border:1px solid var(--line)}
  .coincta{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;padding:11px 14px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(135deg,rgba(236,72,153,0.10),rgba(168,85,247,0.05));text-decoration:none;color:var(--txt);transition:transform .18s,border-color .18s}
  .coincta:hover{border-color:var(--gold-dim);transform:translateY(-1px)}
  .coincta .cc-sym{font-weight:600;font-size:15px;color:var(--gold)}
  .coincta .cc-name{font-size:12px;color:var(--muted)}
  .coincta .cc-r{display:flex;align-items:center;gap:10px;flex:none}
  .coincta .cc-floor{font-size:11px;color:#7ee29a;background:rgba(63,185,80,0.14);padding:3px 8px;border-radius:7px;white-space:nowrap}
  .coincta .cc-btn{font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,#EC4899,#A855F7);padding:7px 14px;border-radius:9px;white-space:nowrap}
  .prodcta{display:flex;align-items:center;gap:12px;margin-top:12px;padding:11px 14px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(168,85,247,0.05));text-decoration:none;color:var(--txt);transition:transform .18s,border-color .18s}
  .prodcta:hover{border-color:var(--blue);transform:translateY(-1px)}
  .prodcta .pthumb{width:42px;height:42px;border-radius:10px;background:radial-gradient(120% 120% at 30% 20%,rgba(34,211,238,.2),rgba(168,85,247,.1));display:grid;place-items:center;font-size:18px;flex:none;overflow:hidden}
  .prodcta .pthumb img{width:100%;height:100%;object-fit:cover}
  .prodcta .pt-title{font-weight:600;font-size:14px}
  .prodcta .pt-price{font-size:12px;color:var(--blue)}
  .prodcta .cc-btn{margin-left:auto;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,#22D3EE,#A855F7);padding:7px 14px;border-radius:9px;white-space:nowrap}
  .pfoot{display:flex;gap:4px;margin-top:12px;font-size:13px;color:var(--muted)}
  .pfoot button{background:none;border:0;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:8px;transition:color .15s,background .15s}
  .pfoot button svg{width:16px;height:16px;display:block}
  .pfoot button:hover{color:var(--gold);background:rgba(236,72,153,0.08)}
  .pfoot .sh{margin-left:auto}
  .cmts{margin-top:12px;padding-left:12px;border-left:2px solid var(--line)}
  .cmt{padding:7px 0;font-size:13px;border-top:1px solid rgba(255,255,255,0.03)}
  .cmt:first-child{border-top:0}.cmt .who{color:var(--gold-dim);font-weight:500}
  .cmt.auto{color:var(--up)}.cmt.auto .who{color:var(--up)}
  .crow{display:flex;gap:8px;margin-top:8px}
  h3{font-size:14px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 5px}
  .rule{display:grid;grid-template-columns:1fr 2fr auto;gap:6px;margin-bottom:6px}
  .muted{color:var(--muted)}.hint{font-size:12px;color:var(--muted);margin-top:8px}
  .chip{font-size:12px;color:var(--gold);border:1px solid var(--line);background:rgba(236,72,153,0.06);padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit}
  .chip:hover{background:rgba(236,72,153,0.12)}
  .chip.on{color:var(--up,#6FE0A8);border-color:rgba(63,185,80,0.4);background:rgba(63,185,80,0.10);cursor:default}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit}
  .tab.active{color:var(--gold);border-color:var(--gold-dim)}
  .like.liked{color:var(--down)}
  .like.liked svg{fill:var(--down)}
  .bell{position:relative}
  .badge-n{position:absolute;top:-7px;right:-7px;background:var(--down);color:#fff;font-size:10px;border-radius:99px;padding:0 5px;min-width:16px;text-align:center}
  .panel{position:absolute;top:60px;right:28px;width:300px;max-height:380px;overflow:auto;background:var(--panel2);border:1px solid var(--line);border-radius:12px;z-index:20;display:none}
  .notif{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.04);font-size:13px}
  .notif:first-child{border-top:0}.notif.unread{background:rgba(236,72,153,0.05)}
  .modal-overlay{position:fixed;inset:0;background:rgba(4,6,10,0.82);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}
  .modal{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow:auto}
  @media(max-width:860px){.wrap{grid-template-columns:1fr}}
  @media(max-width:700px){nav{display:none}}
  .cbadge{display:inline-block;font-size:11px;font-weight:600;color:var(--gold);background:rgba(236,72,153,0.12);border:1px solid var(--line);padding:1px 7px;border-radius:6px;margin-left:6px;cursor:pointer}
  .cbadge:hover{background:rgba(236,72,153,0.2)}
  .coincard{position:fixed;z-index:60;width:280px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid rgba(168,85,247,0.3);border-radius:14px;padding:14px;box-shadow:0 12px 40px rgba(0,0,0,0.5);display:none}
  .cc-head{display:flex;align-items:center;gap:10px}
  .cc-av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:600;color:#fff;font-size:14px;background:linear-gradient(135deg,#EC4899,#A855F7)}
  .cc-name{font-size:15px;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:7px}
  .cc-mint{font-family:monospace;font-size:11px;color:var(--muted)}
  .cc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
  .cc-stat{background:#0b0f18;border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  .cc-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.cc-v{font-size:14px;margin-top:2px}
  .cc-grad{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#fff;background:linear-gradient(135deg,#EC4899,#A855F7);padding:2px 8px;border-radius:7px}
  .cc-view{display:block;text-align:center;margin-top:6px;color:var(--gold);text-decoration:none;font-size:13px;border:1px solid var(--gold-dim);padding:9px;border-radius:9px}
  .cc-view:hover{background:rgba(236,72,153,0.08)}
  .tcoin{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid rgba(255,255,255,0.04);font-size:13px;cursor:pointer}
  .tcoin:first-child{border-top:0}
  .tav{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:600;color:#fff;font-size:11px;background:linear-gradient(135deg,#EC4899,#A855F7)}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.2.0/tabler-icons.min.css">
</head>
<body>
  <div id="appHeader"></div>
  <div class="panel" id="notifPanel"></div>

  <style>.backlink{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;font-weight:500;text-decoration:none;transition:color .15s}.backlink:hover{color:var(--gold,#ec4899)}</style>
  <div class="wrap" style="padding-top:14px;padding-bottom:0">
    <a href="/" onclick="event.preventDefault();goBack()" class="backlink" style="justify-self:start;width:fit-content">← <span data-i18n="nav_back">Back</span></a>
  </div>

  <div class="wrap">
    <div>
      <div class="card" id="composer" style="display:none">
        <textarea id="postText" placeholder="Share a product update, drop, or behind-the-scenes… (min 20 chars + one attachment)"></textarea>
        <input id="postImg" placeholder="image / photo URL — or upload ↓" style="margin-top:8px" />
        <input id="postImgFile" type="file" accept="image/*" onchange="uploadImg(this,'postImg')" style="margin-top:6px;font-size:12px;color:var(--muted)" />
        <input id="postVideo" placeholder="video URL (optional)" style="margin-top:8px" />
        <input id="postFile" placeholder="file / download URL (optional)" style="margin-top:8px" />
        <select id="postCoin" style="margin-top:8px"><option value="">Attach a coin (optional)</option></select>
        <select id="postProduct" style="margin-top:8px"><option value="">Attach a product (optional)</option></select>
        <label id="fanoutRow" style="display:none;align-items:center;gap:8px;font-size:12px;margin-top:10px;color:var(--muted)">
          <input type="checkbox" id="postFanout" style="width:auto"> <i class="ti ti-share-3"></i> Also publish to my connected platforms <span id="fanoutPlatforms" style="color:var(--gold)"></span>
        </label>
        <div style="margin-top:10px;display:flex;justify-content:flex-end;gap:8px">
          <button class="btn sm" id="aiDraftBtn" style="display:none" onclick="aiDraft()">✨ AI draft</button>
          <button class="btn primary" onclick="submitPost()">Post</button>
        </div>
      </div>
      <div class="card" id="connectNote">
        <div class="muted" style="font-size:13px"><i class="ti ti-wallet"></i> Connect your wallet to post, follow, and comment.</div>
      </div>
      <div class="tabs"><button class="tab active" id="tab-all" onclick="setTab('all')">All</button><button class="tab" id="tab-following" onclick="setTab('following')">Following</button></div>
      <div class="card"><h3><span class="dot"></span> Creator feed</h3><div id="feed"><div class="muted" style="font-size:13px">Loading…</div></div></div>
    </div>

    <div>
      <div class="card">
        <h3><span class="dot"></span> Top coins</h3>
        <div id="topCoins"><div class="muted" style="font-size:13px">Loading…</div></div>
      </div>
      <div class="card">
        <h3><span class="dot"></span> Creator Studio <span id="proBadge"></span></h3>
        <div id="studioBody"><div class="muted" style="font-size:13px">Connect your wallet to set up your creator profile.</div></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="profileModal" onclick="if(event.target===this)closeProfile()">
    <div class="modal">
      <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)">
        <div style="flex:1;font-size:18px;font-weight:500" id="pfTitle"></div>
        <button class="btn sm" onclick="closeProfile()">Close</button>
      </div>
      <div style="padding:16px 20px" id="pfBody"></div>
    </div>
  </div>

  <div class="coincard" id="coinCard" onclick="event.stopPropagation()"></div>

<script src="i18n.js"></script>
<script src="wallet.js"></script>
<script src="header.js"></script>
<script>
const api=(p,o)=>fetch(p,o).then(r=>r.json());
const post=(p,b)=>api(p,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b)});
const me=()=>window.KolWallet&&KolWallet.address;
const AI_SHOP=location.hostname.endsWith('oneip.io')?'https://www.oneip.ai':'/ai'; // shop lives on the .ai face
const esc=s=>(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const ago=ts=>{const m=(Date.now()-ts)/6e4;if(m<1)return'now';if(m<60)return Math.round(m)+'m';if(m<1440)return Math.round(m/60)+'h';return Math.round(m/1440)+'d';};

// The shared header (header.js) owns the wallet button + language switcher. The notifications bell
// is feed-specific, so we mount it into the header's extra slot.
function mountBell(){
  const slot=document.getElementById('appHeaderExtra'); if(!slot||document.getElementById('bellBtn'))return;
  const b=document.createElement('button'); b.className='btn bell'; b.id='bellBtn'; b.onclick=toggleNotifs; b.style.display='none';
  b.innerHTML='<i class="ti ti-bell"></i>🔔<span class="badge-n" id="notifCount" style="display:none">0</span>';
  slot.appendChild(b);
}
function onWallet(a){
  const composer=document.getElementById('composer'); if(composer) composer.style.display=a?'block':'none';
  const note=document.getElementById('connectNote'); if(note) note.style.display=a?'none':'block';
  const bell=document.getElementById('bellBtn'); if(bell) bell.style.display=a?'inline-flex':'none';
  if(a){ loadStudio(); loadNotifCount(); loadMyCoins(); loadMyProducts(); } else { const sb=document.getElementById('studioBody'); if(sb) sb.innerHTML='<div class="muted" style="font-size:13px">Connect your wallet to set up your creator profile.</div>'; }
  loadFeed();
}
document.addEventListener('DOMContentLoaded',()=>{ mountBell(); if(window.KolWallet){ KolWallet.onChange(onWallet); onWallet(KolWallet.address); } });

// Back button — return to the previous page, or the .io home if there's no history.
function goBack(){ if(history.length>1){history.back();}else{location.assign('/');} }
// Upload a real image file → data URL → /api/upload → puts the returned /uploads/ URL in `targetId`.
async function uploadImg(inp,targetId){
  const f=inp.files&&inp.files[0]; if(!f)return;
  if(f.size>5000000){alert('Image too large (max 5MB)');inp.value='';return;}
  const data=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);});
  try{ const r=await(await fetch('/api/upload',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({data})})).json();
    if(r.url){const t=document.getElementById(targetId);t.value=r.url;t.style.borderColor='var(--gold,#7ee29a)';} else alert(r.error||'upload failed'); }
  catch(e){ alert('upload failed'); }
}
async function submitPost(){
  const text=document.getElementById('postText').value.trim(), image=document.getElementById('postImg').value.trim();
  const video=document.getElementById('postVideo')?document.getElementById('postVideo').value.trim():'';
  const file=document.getElementById('postFile')?document.getElementById('postFile').value.trim():'';
  const coin=document.getElementById('postCoin')?document.getElementById('postCoin').value:'';
  const product=document.getElementById('postProduct')?document.getElementById('postProduct').value:'';
  // Content gate (mirrors the server): a real post = 20+ chars AND one attachment → makes you a creator.
  if(text.length<20 || !(image||video||file||product)){ alert('A post needs at least 20 characters and one attachment: photo / video / file / product.'); return; }
  const r=await post('/api/posts',{creator:me(),text,image,video,file,coin,product});
  if(r.error){alert(r.error);return;}
  const fanout=document.getElementById('postFanout');
  if(fanout&&fanout.checked&&text){
    const pr=await post('/api/publish/now',{wallet:me(),text,mediaUrls:image?[image]:[]});
    if(pr.error) alert('Posted on oneIP, but cross-post failed: '+pr.error);
    else alert('Also published to '+((pr.items||[]).length)+' platform(s).');
    fanout.checked=false;
  }
  document.getElementById('postText').value='';document.getElementById('postImg').value='';
  const pv=document.getElementById('postVideo'); if(pv) pv.value='';
  const pf=document.getElementById('postFile'); if(pf) pf.value='';
  const pp=document.getElementById('postProduct'); if(pp) pp.value='';
  const pc=document.getElementById('postCoin'); if(pc) pc.value='';
  loadFeed();
}
const mintShort=m=>m?m.slice(0,4)+'…'+m.slice(-4):'';
async function showCoin(mint,ev){
  const card=document.getElementById('coinCard');
  const c=await api('/api/launch?mint='+mint);
  if(!c||c.error){return;}
  const av=(c.symbol||'?').slice(0,2).toUpperCase();
  card.innerHTML=`<div class="cc-head"><div class="cc-av"${c.logo?` style="background:url('${esc(c.logo)}') center/cover"`:''}>${c.logo?'':av}</div>
    <div style="flex:1"><div class="cc-name">$${esc(c.symbol)} ${c.verified?'<span class="cc-grad"><i class="ti ti-check"></i> Verified</span>':''}</div>
      <div class="cc-mint">${esc(c.name||'')} · ${mintShort(c.mint)}</div></div></div>
    <div class="cc-stats"><div class="cc-stat"><div class="cc-l">Floor</div><div class="cc-v">${(c.floorBps||0)/100}%</div></div>
      <div class="cc-stat"><div class="cc-l">Created</div><div class="cc-v">${ago(c.createdAt)} ago</div></div></div>
    <a class="cc-view" href="/coin?mint=${c.mint}">View coin <i class="ti ti-arrow-up-right"></i></a>`;
  const x=Math.min(ev.clientX, window.innerWidth-294), y=Math.min(ev.clientY+12, window.innerHeight-230);
  card.style.left=Math.max(12,x)+'px'; card.style.top=Math.max(12,y)+'px'; card.style.display='block';
}
function closeCoin(){ document.getElementById('coinCard').style.display='none'; }
document.addEventListener('click',e=>{ if(!e.target.closest('.coincard')&&!e.target.closest('.cbadge')&&!e.target.closest('.tcoin')) closeCoin(); });
async function loadTopCoins(){
  const b=await api('/api/board');
  document.getElementById('topCoins').innerHTML = b.length ? b.slice(0,8).map(c=>`<div class="tcoin" onclick="event.stopPropagation();showCoin('${c.mint}',event)"><div class="tav"${c.logo?` style="background:url('${esc(c.logo)}') center/cover"`:''}>${c.logo?'':(c.symbol||'?').slice(0,2).toUpperCase()}</div><div style="flex:1">${esc(c.name)} <span class="muted">$${esc(c.symbol)}</span></div>${c.verified?'<span class="cc-grad"><i class="ti ti-check"></i></span>':''}</div>`).join('')
    : '<div class="muted" style="font-size:13px">No verified coins yet. Launch one to appear here.</div>';
}
async function loadMyCoins(){
  const sel=document.getElementById('postCoin'); if(!sel||!me())return;
  const list=await api('/api/creator/launches?w='+me());
  sel.innerHTML='<option value="">Attach a coin (optional)</option>'+(list||[]).map(l=>`<option value="${l.mint}">$${esc(l.symbol)} — ${esc(l.name)}</option>`).join('');
}
// Resolve the connected wallet → its oneIP.ai account handle → that account's storefront products,
// so a creator can attach one of their products to a post.
async function loadMyProducts(){
  const sel=document.getElementById('postProduct'); if(!sel||!me())return;
  let handle=null;
  try{ const acc=await api('/api/account/by-wallet?wallet='+me()); if(acc&&acc.handle) handle=acc.handle; }catch(e){}
  let list=[];
  if(handle){ try{ list=await api('/api/shop/products?creator='+encodeURIComponent(handle)); }catch(e){} }
  sel.innerHTML='<option value="">Attach a product (optional)</option>'+(list||[]).map(p=>`<option value="${p.id}">${esc(p.title)} — $${(p.priceCents/100).toFixed(2)}</option>`).join('');
}
let feedMode='all';
function setTab(m){ feedMode=m; document.getElementById('tab-all').classList.toggle('active',m==='all'); document.getElementById('tab-following').classList.toggle('active',m==='following'); loadFeed(); }
async function loadFeed(){
  const v=me();
  let u='/api/feed?'+(v?('viewer='+v):'');
  if(feedMode==='following'){ if(!v){document.getElementById('feed').innerHTML='<div class="muted" style="font-size:13px">Connect your wallet to see who you follow.</div>';return;} u+='&following='+v; }
  const posts=await api(u);
  document.getElementById('feed').innerHTML = posts.length ? posts.map(p=>`
    <div class="post">
      <div class="phead">
        <div class="av" onclick="openProfile('${p.creator}')" style="cursor:pointer">${esc((p.creatorName||'?')[0]).toUpperCase()}</div>
        <div style="flex:1"><span style="cursor:pointer" onclick="openProfile('${p.creator}')"><span class="pname">${esc(p.creatorName)}</span>${p.creatorPro?'<span class="pro">PRO</span>':''}</span>${p.coin?`<span class="cbadge" onclick="event.stopPropagation();showCoin('${p.coin.mint}',event)">$${esc(p.coin.symbol)}</span>`:''}<div class="ptime" style="cursor:pointer" onclick="openProfile('${p.creator}')">${ago(p.ts)} ago${p.synced?` · <span style="color:var(--gold-dim)"><i class="ti ti-refresh"></i> ${esc(p.source)}</span>`:''}</div></div>
        ${p.creator===v?`<button class="btn sm" onclick="delPost('${p.id}')">Delete</button>`:`<button class="btn sm" onclick="follow('${p.creator}',this)">Follow</button>`}</div>
      ${p.text?`<div class="ptext">${esc(p.text)}</div>`:''}
      ${p.image?`<img class="pimg" src="${esc(p.image)}" onerror="this.style.display='none'">`:''}
      ${p.coin?`<a class="coincta" href="/coin?mint=${p.coin.mint}">
        <div><div class="cc-sym">$${esc(p.coin.symbol)}</div><div class="cc-name">${esc(p.coin.name||'')}${p.coin.verified?' · ✓':''}</div></div>
        <div class="cc-r"><span class="cc-floor">${(p.coin.floorBps||2000)/100}% floor</span><span class="cc-btn">Trade →</span></div></a>`:''}
      ${p.product?`<a class="prodcta" href="${AI_SHOP}">
        <div class="pthumb">${p.product.image?`<img src="${esc(p.product.image)}">`:(p.product.type==='digital'?'🎬':'🛍️')}</div>
        <div><div class="pt-title">${esc(p.product.title)}</div><div class="pt-price">$${(p.product.priceCents/100).toFixed(2)}</div></div>
        <span class="cc-btn">Buy →</span></a>`:''}
      <div class="pfoot">
        <button class="like ${p.liked?'liked':''}" onclick="toggleLike('${p.id}',this)" aria-label="like">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
          <span>${p.likes}</span></button>
        <button onclick="toggleC('${p.id}')" aria-label="comments">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-4-.9L3 21l1.9-4.5A8.4 8.4 0 1 1 21 11.5z"/></svg>
          <span>${p.commentCount}</span></button></div>
      <div class="cmts" id="cm-${p.id}" style="display:none"></div>
    </div>`).join('') : '<div class="muted" style="font-size:13px">No posts here yet.</div>';
}
async function toggleLike(id,btn){
  if(!me()){alert('connect wallet');return;}
  const r=await post('/api/like',{postId:id,fan:me()});
  btn.classList.toggle('liked',r.liked); btn.querySelector('span').textContent=r.likes;
}
async function delPost(id){ if(!confirm('Delete this post?'))return; await post('/api/posts/delete',{postId:id,creator:me()}); loadFeed(); }
async function follow(creator,btn){
  if(!me()){alert('connect wallet');return;}
  const r=await post('/api/follow',{fan:me(),creator});
  if(!r.error){btn.textContent='Following ('+r.followers+')';btn.disabled=true;}
}
async function toggleC(id){
  const el=document.getElementById('cm-'+id);
  if(el.style.display==='block'){el.style.display='none';return;}
  el.style.display='block';
  const cs=await api('/api/comments?post='+id);
  el.innerHTML=cs.map(c=>`<div class="cmt ${c.auto?'auto':''}"><span class="who">${c.auto?'↩ auto':esc((c.fan||'').slice(0,6))}</span> ${esc(c.text)}</div>`).join('')
    + (me()?`<div class="crow"><input id="ci-${id}" placeholder="add a comment…" /><button class="btn sm" onclick="addC('${id}')">Send</button></div>`:'<div class="hint">connect wallet to comment</div>');
}
async function addC(id){
  const v=document.getElementById('ci-'+id).value.trim(); if(!v)return;
  await post('/api/comments',{postId:id,fan:me(),text:v});
  document.getElementById('cm-'+id).style.display='none';toggleC(id);loadFeed();
}

// ---- creator profile ----
async function openProfile(w){
  const m=document.getElementById('profileModal'); m.style.display='flex';
  document.getElementById('pfTitle').textContent='';
  document.getElementById('pfBody').innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">loading…</div>';
  const c=await api('/api/creator?w='+w+(me()?'&viewer='+me():''));
  const name=c.displayName||w.slice(0,6);
  document.getElementById('pfTitle').innerHTML=esc(name)+(c.pro?' <span class="pro">PRO</span>':'');
  const canAct=me()&&me()!==w;
  const followBtn=canAct?`<button class="btn sm" id="pfFollow" onclick="pfFollow('${w}')">${c.following?'Following':'Follow'}</button>`:'';
  const subBtn=canAct?`<button class="btn primary sm" id="pfSub" onclick="pfSub('${w}')">${c.subscribed?'Subscribed':'Subscribe'}</button>`:'';
  document.getElementById('pfBody').innerHTML=`
    <div style="font-size:13px;color:var(--muted)">${esc(c.bio||'')}</div>
    <div style="display:flex;gap:18px;margin:12px 0;font-size:13px"><span><b>${c.followers||0}</b> <span class="muted">followers</span></span><span><b>${c.subscribers||0}</b> <span class="muted">subscribers</span></span></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">${followBtn}${subBtn}</div>
    <div class="muted" style="font-size:12px;margin-bottom:6px">Posts</div>
    ${(c.posts||[]).map(p=>`<div style="padding:9px 0;border-top:1px solid rgba(255,255,255,0.04);font-size:13px">${esc(p.text||'(image)')}<div class="ptime">${ago(p.ts)} ago · ♥ ${p.likes} · ${p.commentCount} comments</div></div>`).join('')||'<div class="muted" style="font-size:13px">No posts</div>'}`;
}
function closeProfile(){ document.getElementById('profileModal').style.display='none'; }
async function pfFollow(w){ await post('/api/follow',{fan:me(),creator:w}); const b=document.getElementById('pfFollow'); if(b)b.textContent='Following'; }
async function pfSub(w){ const b=document.getElementById('pfSub'); const subbed=b.textContent==='Subscribed'; const r=await post(subbed?'/api/unsubscribe':'/api/subscribe',{fan:me(),creator:w}); b.textContent=r.subscribed?'Subscribed':'Subscribe'; }

// ---- notifications ----
let notifOpen=false;
async function loadNotifCount(){ if(!me())return; const n=await api('/api/notifications?w='+me()); const el=document.getElementById('notifCount'); if(n.unread>0){el.style.display='block';el.textContent=n.unread;}else el.style.display='none'; }
async function toggleNotifs(){
  const panel=document.getElementById('notifPanel'); notifOpen=!notifOpen; panel.style.display=notifOpen?'block':'none';
  if(notifOpen){
    const n=await api('/api/notifications?w='+me());
    panel.innerHTML=n.items.length?n.items.map(x=>`<div class="notif ${x.read?'':'unread'}">${esc(x.text)}<div class="ptime">${ago(x.ts)} ago</div></div>`).join(''):'<div class="notif muted" style="color:var(--muted)">No notifications</div>';
    await post('/api/notifications/read',{wallet:me()}); document.getElementById('notifCount').style.display='none';
  }
}

// ---- Creator Studio ----
let rules=[];
async function loadStudio(){
  const c=await api('/api/creator?w='+me());
  // Subscription tiers removed — all creator tools (AI clone + multi-platform publishing) are free.
  // Publishing is managed in one place: the Studio page. This inline panel is a read-only summary.
  document.getElementById('proBadge').innerHTML='';
  rules=Array.isArray(c.autoReplies)&&c.autoReplies.length?c.autoReplies:[{keyword:'',reply:''}];
  document.getElementById('studioBody').innerHTML=`
    <label>Display name</label><input id="s-name" value="${esc(c.displayName||'')}" />
    <label>Bio</label><input id="s-bio" value="${esc(c.bio||'')}" />
    <label>Auto-replies <span class="muted">(keyword → reply; leave keyword "*" for a default)</span></label>
    <div id="rules"></div>
    <button class="btn sm" onclick="addRule()" style="margin-top:6px">+ add rule</button>
    <label style="margin-top:16px">AI clone <span class="muted">(drafts a reply when no keyword matches · free)</span></label>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" id="s-ai" ${c.aiEnabled?'checked':''} style="width:auto"> Enable AI auto-reply</label>
    <textarea id="s-persona" placeholder="Persona / instructions for your AI clone — tone, what to say, what to avoid" style="margin-top:6px;min-height:64px">${esc(c.aiPersona||'')}</textarea>
    <label style="margin-top:16px">Auto-sync from a social <span class="muted">(mirror your posts here)</span></label>
    <div style="display:flex;gap:6px">
      <select id="s-syncp" style="flex:1">${['','twitter','instagram','tiktok','youtube'].map(pf=>`<option value="${pf}" ${c.syncPlatform===pf?'selected':''}>${pf||'None'}</option>`).join('')}</select>
      <input id="s-synch" placeholder="@handle" value="${esc(c.syncHandle||'')}" style="flex:1" />
    </div>
    <button class="btn sm" onclick="syncNow()" style="margin-top:8px"><i class="ti ti-refresh"></i> Sync now</button>
    <label style="margin-top:16px">Multi-platform publishing <span class="muted">(post once → everywhere · free)</span></label>
    <div id="pubChips" style="display:flex;flex-wrap:wrap;gap:6px"><span class="muted" style="font-size:12px">loading…</span></div>
    <div class="hint" style="margin-top:4px">Tick "Also publish to my connected platforms" in the composer to fan out a post. <a href="/studio" style="color:var(--gold);text-decoration:none">Connect &amp; manage all 14 platforms in Studio →</a></div>
    <div style="margin-top:14px"><button class="btn primary" onclick="saveStudio()">Save</button>
      <span class="muted" id="saved" style="font-size:12px;margin-left:8px"></span></div>
    <div class="hint">Followers: ${c.followers||0} · Posts: ${(c.posts||[]).length}.</div>`;
  renderRules();
  const adb=document.getElementById('aiDraftBtn'); if(adb) adb.style.display='inline-flex';
  loadPublish();
}
async function aiDraft(){
  if(!me())return;
  const topic=prompt('What should the post be about?'); if(!topic)return;
  const btn=document.getElementById('aiDraftBtn'); btn.textContent='✨ drafting…'; btn.disabled=true;
  const r=await post('/api/ai/draft',{wallet:me(),prompt:topic});
  btn.textContent='✨ AI draft'; btn.disabled=false;
  if(r.error){alert(r.error);return;}
  document.getElementById('postText').value=r.text; document.getElementById('postText').focus();
}

// ---- Multi-platform publishing (AiToEarn, hidden behind oneIP) ----
const PUB_PLATFORMS=[['twitter','Twitter'],['tiktok','TikTok'],['youtube','YouTube'],['instagram','Instagram'],['facebook','Facebook'],['threads','Threads']];
// Read-only connected summary. Connecting/disconnecting lives in the unified Studio publish panel
// (web/studio.html) so there's a single management surface. The composer fan-out toggle below
// still cross-posts to whatever is connected.
async function loadPublish(){
  const box=document.getElementById('pubChips'); if(!box)return;
  const r=await api('/api/publish/accounts?wallet='+me());
  const acc=(r&&r.accounts)||{};
  const connected=PUB_PLATFORMS.filter(([id])=>acc[id]);
  box.innerHTML = connected.length
    ? connected.map(([,label])=>`<span class="chip on" title="connected">✓ ${label}</span>`).join('')
      + `<a href="/studio" class="chip" style="text-decoration:none">＋ connect more</a>`
    : `<a href="/studio" class="chip" style="text-decoration:none">＋ Connect platforms in Studio</a>`;
  // composer fan-out toggle reflects connected platforms
  const names=connected.map(([,l])=>l);
  const row=document.getElementById('fanoutRow'), tag=document.getElementById('fanoutPlatforms');
  if(row){ row.style.display=names.length?'flex':'none'; if(tag)tag.textContent=names.length?('('+names.join(', ')+')'):''; }
}
function renderRules(){
  document.getElementById('rules').innerHTML=rules.map((r,i)=>`<div class="rule">
    <input value="${esc(r.keyword)}" placeholder="keyword / *" oninput="rules[${i}].keyword=this.value">
    <input value="${esc(r.reply)}" placeholder="reply" oninput="rules[${i}].reply=this.value">
    <button class="btn sm" onclick="rules.splice(${i},1);renderRules()">✕</button></div>`).join('');
}
function addRule(){rules.push({keyword:'',reply:''});renderRules();}
async function syncNow(){
  if(!me())return;
  await saveStudio();
  const r=await post('/api/sync/now',{wallet:me()});
  if(r.error){alert(r.error);return;}
  alert('Synced '+(r.synced||0)+' post(s)'+(r.platform?(' from '+r.platform):''));
  loadFeed();
}
async function saveStudio(){
  const clean=rules.filter(r=>r.reply&&r.reply.trim());
  const body={wallet:me(),displayName:document.getElementById('s-name').value.trim(),bio:document.getElementById('s-bio').value.trim(),autoReplies:clean};
  const aiEl=document.getElementById('s-ai'); if(aiEl){ body.aiEnabled=aiEl.checked; body.aiPersona=(document.getElementById('s-persona').value||'').trim(); }
  const sp=document.getElementById('s-syncp'); if(sp){ body.syncPlatform=sp.value; body.syncHandle=(document.getElementById('s-synch').value||'').trim(); }
  await post('/api/creator',body);
  document.getElementById('saved').textContent='saved ✓';setTimeout(()=>document.getElementById('saved').textContent='',1500);
}

onWallet(me());loadFeed();loadTopCoins();
</script>
